<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SitCheck Moderator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      font-family: "Inter", sans-serif;
      --text: #132238;
      --muted: #5f6f86;
      --line: rgba(215, 225, 238, 0.9);
      --panel: rgba(255, 255, 255, 0.96);
      --primary: #2457f5;
      --primary-dark: #153bb6;
      --ok-bg: #e9fdf8;
      --ok-text: #087364;
      --warn-bg: #fff4df;
      --warn-text: #9a5d00;
      --danger-bg: #ffe9ee;
      --danger-text: #9a1d35;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eef4ff 0%, #f8fbff 100%);
      color: var(--text);
      padding: 20px;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 18px 40px rgba(19, 34, 56, 0.12);
      padding: 22px;
    }

    .header-card {
      position: sticky;
      top: 12px;
      z-index: 30;
      backdrop-filter: blur(8px);
    }

    .heading-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .heading-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--primary);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #f8fbff;
      font-size: 0.94rem;
    }

    .status.is-error {
      background: var(--danger-bg);
      color: var(--danger-text);
      border-color: rgba(154, 29, 53, 0.24);
    }

    .status.is-success {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: rgba(8, 115, 100, 0.2);
    }

    .hidden {
      display: none !important;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      text-decoration: none;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1;
      background: #fff;
      cursor: pointer;
    }

    .button.primary {
      background: var(--primary);
      border-color: transparent;
      color: #fff;
    }

    .button.primary:hover {
      background: var(--primary-dark);
    }

    .button.warn {
      background: var(--warn-bg);
      color: var(--warn-text);
      border-color: rgba(154, 93, 0, 0.2);
    }

    .button.success {
      background: #0a9b77;
      border-color: transparent;
      color: #fff;
      box-shadow: 0 10px 22px rgba(10, 155, 119, 0.28);
    }

    .button.success:hover:not(:disabled) {
      background: #087364;
    }

    .button.danger {
      background: #d72647;
      border-color: transparent;
      color: #fff;
      box-shadow: 0 10px 22px rgba(215, 38, 71, 0.24);
    }

    .button.danger:hover:not(:disabled) {
      background: #b01e38;
    }

    .button:disabled {
      background: #e4eaf2 !important;
      border-color: #c8d3e3 !important;
      color: #7b8799 !important;
      box-shadow: none !important;
      opacity: 1;
      cursor: not-allowed;
    }

    .auth-form {
      display: grid;
      gap: 12px;
      max-width: 420px;
      margin-top: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .queue-filter-group {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    .queue-filter-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-width: 0;
      min-height: 42px;
      padding: 0 4px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: clamp(0.72rem, 3.4vw, 0.9rem);
      font-weight: 700;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      cursor: pointer;
    }

    .queue-filter-button.is-active {
      background: var(--primary);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 8px 18px rgba(36, 87, 245, 0.22);
    }

    .queue-edit-form .field select,
    .queue-edit-form .field select option {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-text-fill-color: var(--text);
      color: var(--text);
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      margin-top: 12px;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .queue-search {
      width: min(360px, 100%);
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .refresh-button {
      width: min(360px, 100%);
      justify-content: center;
      background: var(--primary);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 12px 24px rgba(36, 87, 245, 0.22);
    }

    .refresh-button:hover {
      background: rgba(36, 87, 245, 0.92);
    }

    .refresh-button:disabled {
      box-shadow: none;
    }

    .queue-list {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .queue-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .queue-item h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .queue-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .queue-location-snapshot {
      display: grid;
      gap: 8px;
      margin-top: 2px;
    }

    .queue-location-snapshot iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #eef4ff;
    }

    .snapshot-link {
      width: fit-content;
      color: var(--primary);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
    }

    .snapshot-link:hover {
      text-decoration: underline;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #eef4ff;
      color: #2457f5;
    }

    .tag.pending {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .tag.approved {
      background: var(--ok-bg);
      color: var(--ok-text);
    }

    .tag.rejected {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .accuracy-counts {
      margin: 0;
      font-size: 0.86rem;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 600;
    }

    .accuracy-last-confirmed {
      margin: -8px 0 0;
      font-size: 0.86rem;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 600;
    }

    .queue-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .queue-actions .button {
      min-height: 42px;
      padding: 0 18px;
      font-weight: 700;
    }

    .queue-actions .button.secondary {
      background: #fff;
      border-color: #7f95b8;
      color: #1a3152;
      box-shadow: 0 4px 12px rgba(19, 34, 56, 0.08);
    }

    .queue-actions .button.secondary:hover:not(:disabled) {
      background: #eef4ff;
      border-color: var(--primary);
      color: var(--primary-dark);
    }

    .button.secondary {
      background: #f8fbff;
    }

    .queue-edit-panel {
      margin-top: 4px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f8fbff;
    }

    .queue-edit-form {
      display: grid;
      gap: 12px;
    }

    .queue-edit-form .field select,
    .queue-edit-form .field textarea,
    .queue-edit-form .field input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .queue-edit-form .field select {
      appearance: auto;
      -webkit-appearance: menulist;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .queue-edit-form .field textarea {
      resize: vertical;
      min-height: 88px;
    }

    .queue-edit-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toggle-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 44px;
    }

    .toggle-row .toggle-label {
      flex: 0 0 auto;
      min-width: 7.5rem;
      font-size: 0.94rem;
      font-weight: 600;
      color: var(--text);
    }

    .toggle-switch {
      position: relative;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      cursor: pointer;
    }

    .toggle-switch-fill {
      flex: 1;
      min-width: 0;
    }

    .toggle-switch-fill .toggle-track {
      display: block;
      width: 100%;
      height: 36px;
      border-radius: 999px;
      background: rgba(95, 111, 134, 0.32);
      position: relative;
      transition: background 180ms ease;
    }

    .toggle-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .toggle-switch-fill .toggle-track::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: min(79px, calc((100% - 6px) * 0.72));
      height: calc(100% - 6px);
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(19, 34, 56, 0.18);
      transition:
        left 180ms ease,
        right 180ms ease,
        background 180ms ease;
    }

    .toggle-input:checked + .toggle-track {
      background: var(--primary);
    }

    .toggle-input:checked + .toggle-track::after {
      left: auto;
      right: 3px;
    }

    .toggle-input:focus-visible + .toggle-track {
      outline: 2px solid rgba(36, 87, 245, 0.18);
      outline-offset: 2px;
    }

    .queue-edit-form input:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    @media (max-width: 860px) {
      body {
        padding: 8px;
      }

      .shell {
        gap: 10px;
      }

      .header-card {
        top: 4px;
        padding: 10px 12px;
        border-radius: 16px;
      }

      .header-card .heading-row {
        align-items: center;
        flex-wrap: nowrap;
        gap: 10px;
        margin-bottom: 0;
      }

      .header-card .eyebrow {
        margin-bottom: 2px;
        font-size: 0.65rem;
      }

      .header-card h1 {
        font-size: 1.1rem;
        line-height: 1.2;
        white-space: nowrap;
      }

      .header-card .heading-row > div:first-child > p:not(.eyebrow) {
        display: none;
      }

      .header-card .heading-actions {
        margin-left: auto;
        flex-wrap: nowrap;
        gap: 6px;
      }

      .header-card .heading-actions .button {
        min-height: 34px;
        padding: 0 9px;
        font-size: 0.76rem;
        white-space: nowrap;
      }

      .header-card .status {
        margin-top: 8px;
        padding: 7px 9px;
        font-size: 0.8rem;
      }
    }

    .review-confirm-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .review-confirm-modal.hidden {
      display: none;
    }

    .review-confirm-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(19, 34, 56, 0.52);
      backdrop-filter: blur(3px);
    }

    .review-confirm-dialog {
      position: relative;
      z-index: 1;
      width: min(440px, 100%);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 24px 48px rgba(19, 34, 56, 0.22);
    }

    .review-confirm-dialog h2 {
      margin: 0 0 10px;
      font-size: 1.25rem;
      line-height: 1.3;
    }

    .review-confirm-name {
      margin: 0 0 4px;
      font-weight: 700;
      color: var(--text);
    }

    .review-confirm-location {
      margin: 0 0 12px;
      font-size: 0.94rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .review-confirm-message {
      margin: 0 0 18px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .review-confirm-message.is-approve {
      background: var(--ok-bg);
      color: var(--ok-text);
      border: 1px solid rgba(8, 115, 100, 0.2);
    }

    .review-confirm-message.is-reject {
      background: var(--danger-bg);
      color: var(--danger-text);
      border: 1px solid rgba(154, 29, 53, 0.22);
    }

    .review-confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .review-confirm-actions .button {
      min-height: 42px;
      padding: 0 18px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card header-card">
      <div class="heading-row">
        <div>
          <p class="eyebrow">SitCheck</p>
          <h1>Moderator Console</h1>
          <p>Review submissions and approve or reject entries.</p>
        </div>
        <div class="heading-actions">
          <a class="button" href="index.html">Back to Map</a>
          <button id="sign-out-button" class="button hidden" type="button">Sign Out</button>
        </div>
      </div>
      <div id="page-status" class="status hidden" role="status" aria-live="polite"></div>
    </section>

    <section id="auth-card" class="card">
      <h2>Moderator login</h2>
      <p>Sign in with your moderator account.</p>
      <form id="auth-form" class="auth-form">
        <label class="field">
          <span>Email</span>
          <input id="email-input" type="email" required autocomplete="email">
        </label>
        <label class="field">
          <span>Password</span>
          <input id="password-input" type="password" required autocomplete="current-password">
        </label>
        <button id="sign-in-button" class="button primary" type="submit">Sign in</button>
      </form>
    </section>

    <section id="queue-card" class="card hidden">
      <div class="heading-row">
        <div>
          <h2>Submission queue</h2>
          <p id="session-label"></p>
        </div>
      </div>

      <div class="toolbar">
        <div class="queue-filter-group" role="group" aria-label="Filter queue">
          <button type="button" class="queue-filter-button is-active" data-queue-filter="pending">Pending</button>
          <button type="button" class="queue-filter-button" data-queue-filter="approved">Approved</button>
          <button type="button" class="queue-filter-button" data-queue-filter="rejected">Rejected</button>
          <button type="button" class="queue-filter-button" data-queue-filter="all">All</button>
        </div>
        <div class="toolbar-actions">
          <input
            id="queue-search"
            class="queue-search"
            type="search"
            placeholder="Search name, location, notes…"
            autocomplete="off"
            aria-label="Search submissions"
          >
          <button id="refresh-button" class="button refresh-button" type="button">Refresh</button>
        </div>
      </div>

      <div id="queue-list" class="queue-list"></div>
    </section>
  </main>

  <div id="review-confirm-modal" class="review-confirm-modal hidden" hidden>
    <div class="review-confirm-backdrop" data-review-confirm-dismiss aria-hidden="true"></div>
    <div
      class="review-confirm-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="review-confirm-title"
      aria-describedby="review-confirm-message"
    >
      <h2 id="review-confirm-title">Confirm action</h2>
      <p id="review-confirm-name" class="review-confirm-name"></p>
      <p id="review-confirm-location" class="review-confirm-location"></p>
      <p id="review-confirm-message" class="review-confirm-message"></p>
      <div class="review-confirm-actions">
        <button id="review-confirm-cancel" type="button" class="button secondary">Cancel</button>
        <button id="review-confirm-confirm" type="button" class="button success">Confirm</button>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    crossorigin="anonymous"
  ></script>
  <script src="config.js"></script>
  <script src="custom-select.js"></script>
  <script src="admin.js"></script>
</body>
</html>
